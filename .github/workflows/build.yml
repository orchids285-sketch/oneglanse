name: Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - '.npmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PREFIX: ghcr.io/${{ github.repository_owner }}
  PNPM: '10.16.0'

jobs:
  # ── Typecheck ────────────────────────────────────────────────
  validate:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── Detect which apps changed ────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web:      ${{ steps.f.outputs.web }}
      agent:    ${{ steps.f.outputs.agent }}
      postgres: ${{ steps.f.outputs.postgres }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
            agent:
              - 'apps/agent/**'
              - 'packages/**'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
            postgres:
              - 'packages/db/Dockerfile'
              - 'packages/db/init-scripts/**'
              - '.github/workflows/build.yml'

  # ── Build jobs ───────────────────────────────────────────────
  build-web:
    name: Web
    needs: [validate, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.PREFIX }}/oneglanse-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          build-args: PNPM_VERSION=${{ env.PNPM }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=oneglanse-web
          cache-to: type=gha,scope=oneglanse-web,mode=max

  build-agent:
    name: Agent
    needs: [validate, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.agent == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.PREFIX }}/oneglanse-agent
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/agent/Dockerfile
          build-args: |
            PNPM_VERSION=${{ env.PNPM }}
            CAMOUFOX_PIP_SPEC=cloverlabs-camoufox[geoip]
            CAMOUFOX_BROWSER_CHANNEL=official/prerelease
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=oneglanse-agent
          cache-to: type=gha,scope=oneglanse-agent,mode=max

  build-postgres:
    name: Postgres
    needs: [validate, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.postgres == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.PREFIX }}/oneglanse-postgres
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/db/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=oneglanse-postgres
          cache-to: type=gha,scope=oneglanse-postgres,mode=max
