<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OneGlanse | Deploying</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --fg: #f5f7fb;
        --muted: #b8c0d4;
        --card: rgba(17, 24, 39, 0.84);
        --border: rgba(148, 163, 184, 0.24);
        --accent: #7dd3fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.18), transparent 32%),
          linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
        color: var(--fg);
      }

      .card {
        width: min(100%, 560px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.38);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(125, 211, 252, 0.32);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        animation: pulse 1.2s infinite ease-in-out;
      }

      h1 {
        margin: 20px 0 10px;
        font-size: clamp(32px, 4vw, 44px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.65;
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <span class="dot"></span>
        Deploy in progress
      </div>
      <h1>Be right back in a few seconds.</h1>
      <p>
        OneGlanse is applying a fresh deploy right now. The app usually comes
        back within a few seconds without affecting the landing page or docs.
      </p>
    </main>
  </body>
</html>
