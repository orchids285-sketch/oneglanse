name: oneglanse-app

services:
  # ----------------------------
  # Agent Worker
  # ----------------------------
  agent-worker:
    build:
      context: .
      dockerfile: ./apps/agent/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
        CAMOUFOX_PIP_SPEC: "${CAMOUFOX_PIP_SPEC:-cloverlabs-camoufox[geoip]}"
        CAMOUFOX_BROWSER_CHANNEL: "${CAMOUFOX_BROWSER_CHANNEL:-official/prerelease}"
    image: oneglanse-agent:local
    container_name: oneglanse-agent-worker
    restart: unless-stopped
    stop_grace_period: 16m
    shm_size: "2gb"
    environment:
      ONEGLANSE_APP_MODE: self-hosted
      AGENT_AUTH_ROOT_DIR: /storage/auth
      AGENT_API_HOST: 0.0.0.0
      AGENT_API_PORT: 3333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_AUTH_UPLOAD_TOKEN: ${AGENT_AUTH_UPLOAD_TOKEN:-oneglanse-upload-token}
      PROXY_PROVIDER: ${PROXY_PROVIDER:-}
      PROXY_SCHEME: ${PROXY_SCHEME:-}
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT: ${PROXY_PORT:-}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      THORDATA_PROXY_API_URL: ${THORDATA_PROXY_API_URL:-}
      CAMOUFOX_HEADLESS_MODE: ${CAMOUFOX_HEADLESS_MODE:-virtual}
      CAMOUFOX_PYTHON_BIN: ${CAMOUFOX_PYTHON_BIN:-}
      DEBUG_ENABLED: ${DEBUG_ENABLED:-false}
    volumes:
      - /opt/oneglanse/storage:/storage
    ports:
      - "3333:3333"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - data
      - backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "node", "-e", "require('ioredis').default({host:'redis'}).ping().then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------
  # Redis
  # ----------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redis}\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ----------------------------
  # PostgreSQL (OFFICIAL IMAGE)
  # ----------------------------
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-oneglanse}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./packages/db/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-oneglanse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------
  # ClickHouse
  # ----------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_db
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-oneglanse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./packages/db/clickhouse-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-default} --password ${CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------
  # Web App (Next.js / UI)
  # ----------------------------
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
    image: oneglanse-web:local
    container_name: oneglanse-web
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      ONEGLANSE_APP_MODE: self-hosted
      AGENT_AUTH_ROOT_DIR: /storage/auth
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-oneglanse}
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      APP_URL: ${APP_URL:-http://web:3000}
      API_BASE_URL: ${API_BASE_URL:-http://web:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-o1Gk9Q2mR7xL4vP8sN6dF3hT5yC1uJ0wB4eK7aM2p}
      INTERNAL_CRON_SECRET: ${INTERNAL_CRON_SECRET:-oneglanse-cron-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /opt/oneglanse/storage:/storage:ro
    networks:
      - edge
      - frontend
      - backend
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # ----------------------------
  # Database Migrations (ONE-SHOT)
  # ----------------------------
  migrate:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
    image: oneglanse-web:local
    container_name: oneglanse-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-oneglanse}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    working_dir: /workspace
    networks:
      - data
    command: pnpm --filter @oneglanse/db db:migrate

# ----------------------------
# Volumes
# ----------------------------
volumes:
  db_data:
  clickhouse_data:
  redis_data:

networks:
  edge:
    external: true
    name: oneglanse-edge
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
