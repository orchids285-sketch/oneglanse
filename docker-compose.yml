name: oneglanse-app

services:
  # ----------------------------
  # Agent Worker
  # ----------------------------
  agent-worker:
    build:
      context: .
      dockerfile: ./apps/agent/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
        CAMOUFOX_PIP_SPEC: "${CAMOUFOX_PIP_SPEC:-cloverlabs-camoufox[geoip]}"
        CAMOUFOX_BROWSER_CHANNEL: "${CAMOUFOX_BROWSER_CHANNEL:-official/stable}"
    image: ${ONEGLANSE_AGENT_IMAGE:-ghcr.io/aryamantodkar/oneglanse-agent:latest}
    container_name: oneglanse-agent-worker
    restart: unless-stopped
    stop_grace_period: 16m
    shm_size: "2gb"
    env_file:
      - .env
    environment:
      ONEGLANSE_APP_MODE: self-host
      AGENT_AUTH_ROOT_DIR: /storage/auth
    volumes:
      - ${ONEGLANSE_STORAGE_ROOT:-/opt/oneglanse/storage}:/storage
    ports:
      - "3333:3333"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - data
      - backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "node", "-e", "require('ioredis').default({host:'redis'}).ping().then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------
  # Redis
  # ----------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redis}\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ----------------------------
  # PostgreSQL (OFFICIAL IMAGE)
  # ----------------------------
  db:
    build:
      context: .
      dockerfile: ./packages/db/Dockerfile
    image: ${ONEGLANSE_POSTGRES_IMAGE:-ghcr.io/aryamantodkar/oneglanse-postgres:latest}
    container_name: postgres_db
    restart: always
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB:-oneglanse}
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./packages/db/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-oneglanse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------
  # ClickHouse
  # ----------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./packages/db/clickhouse-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-default} --password ${CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------
  # Web App (Next.js / UI)
  # ----------------------------
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
    image: ${ONEGLANSE_WEB_IMAGE:-ghcr.io/aryamantodkar/oneglanse-web:latest}
    container_name: oneglanse-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      ONEGLANSE_APP_MODE: self-host
      AGENT_AUTH_ROOT_DIR: /storage/auth
    volumes:
      - ${ONEGLANSE_STORAGE_ROOT:-/opt/oneglanse/storage}:/storage:ro
    networks:
      - edge
      - frontend
      - backend
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # ----------------------------
  # Database Migrations (ONE-SHOT)
  # ----------------------------
  migrate:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PNPM_VERSION: "${PNPM_VERSION:-10.16.0}"
    image: ${ONEGLANSE_WEB_IMAGE:-ghcr.io/aryamantodkar/oneglanse-web:latest}
    container_name: oneglanse-migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    working_dir: /workspace
    networks:
      - data
    command: pnpm --filter @oneglanse/db db:migrate

# ----------------------------
# Volumes
# ----------------------------
volumes:
  db_data:
  clickhouse_data:
  redis_data:

networks:
  edge:
    external: true
    name: oneglanse-edge
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
