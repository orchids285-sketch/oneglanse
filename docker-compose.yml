services:
  # ----------------------------
  # Agent Worker
  # ----------------------------
  agent-worker:
    image: ghcr.io/aryamantodkar/oneglanse-agent:latest
    pull_policy: always
    container_name: oneglanse-agent-worker
    restart: unless-stopped
    stop_grace_period: 16m
    env_file:
      - .env
      - apps/agent/.env
    shm_size: "1gb"
    volumes:
      - agent_storage:/storage
    depends_on:
      redis:
        condition: service_healthy
    command: pnpm start:worker
    networks:
      - backend
      - data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ----------------------------
  # Redis
  # ----------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ----------------------------
  # PostgreSQL (OFFICIAL IMAGE)
  # ----------------------------
  db:
    image: ghcr.io/aryamantodkar/oneglanse-postgres:latest
    container_name: postgres_db
    restart: always
    env_file: .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./packages/db/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------
  # ClickHouse
  # ----------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./packages/db/clickhouse-init:/docker-entrypoint-initdb.d
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-default} --password ${CLICKHOUSE_PASSWORD:-password} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------
  # Web App (Next.js / UI)
  # ----------------------------
  web:
    image: ghcr.io/aryamantodkar/oneglanse-web:latest
    pull_policy: always
    container_name: oneglanse-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    networks:
      - frontend
      - backend
      - data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # ----------------------------
  # Database Migrations (ONE-SHOT)
  # ----------------------------
  migrate:
    image: ghcr.io/aryamantodkar/oneglanse-web:latest
    pull_policy: always
    container_name: oneglanse-migrate
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    working_dir: /workspace
    networks:
      - data
    command: pnpm --filter @oneglanse/db db:migrate

# ----------------------------
# Volumes
# ----------------------------
volumes:
  db_data:
  clickhouse_data:
  redis_data:
  agent_storage:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
